<script>
const starCanvas = document.getElementById('stars');
const starCtx = starCanvas.getContext('2d');
const stars = [];
function resizeStars() { starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight; }
resizeStars();
window.addEventListener('resize', resizeStars);
for (let i = 0; i < 160; i++) stars.push({ x: Math.random() * starCanvas.width, y: Math.random() * starCanvas.height, r: Math.random() * 1.5 + 0.3, phase: Math.random(), speed: Math.random() * 0.008 + 0.003 });
function drawStars() { starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height); for (const s of stars) { s.phase += s.speed; const a = 0.5 + 0.5 * Math.sin(s.phase); starCtx.beginPath(); starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); starCtx.fillStyle = 'rgba(255,255,255,' + a + ')'; starCtx.fill(); } requestAnimationFrame(drawStars); }
drawStars();

const balloonColors = ['#ff6b6b','#f368e0','#ff9ff3','#54a0ff','#5f27cd','#1dd1a1','#feca57','#ff9f43','#ee5a24','#00d2d3'];
const balloonContainer = document.getElementById('balloonContainer');
function lighten(hex, amt) { const c = parseInt(hex.replace('#',''), 16); const r = Math.min(255, (c >> 16) + amt); const g = Math.min(255, ((c >> 8) & 0x00FF) + amt); const b = Math.min(255, (c & 0x0000FF) + amt); return 'rgb(' + r + ',' + g + ',' + b + ')'; }
function createBalloon() { const el = document.createElement('div'); el.className = 'balloon'; const color = balloonColors[Math.floor(Math.random() * balloonColors.length)]; el.style.background = 'radial-gradient(circle at 35% 30%, ' + lighten(color, 40) + ', ' + color + ')'; el.style.color = color; el.style.left = Math.random() * 100 + '%'; el.style.transform = 'scale(' + (0.7 + Math.random() * 0.8) + ')'; el.style.animationDuration = (8 + Math.random() * 12) + 's'; balloonContainer.appendChild(el); setTimeout(() => el.remove(), 20000); }
setInterval(createBalloon, 900);
for (let i = 0; i < 10; i++) setTimeout(createBalloon, i * 150);

const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');
const confettiPieces = [];
let confettiRunning = false;
function resizeConfetti() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
resizeConfetti();
window.addEventListener('resize', resizeConfetti);
const confettiColors = ['#ff6b6b','#f368e0','#ff9ff3','#54a0ff','#5f27cd','#1dd1a1','#feca57','#ff9f43','#ee5a24','#00d2d3','#ff6b9d','#c44dff'];
function createPiece() { return { x: Math.random() * confettiCanvas.width, y: -20 - Math.random() * 200, w: 5 + Math.random() * 7, h: 3 + Math.random() * 5, color: confettiColors[Math.floor(Math.random() * confettiColors.length)], vy: 1.5 + Math.random() * 2.5, vx: -2 + Math.random() * 4, rotation: Math.random() * 360, rotSpeed: -4 + Math.random() * 8, opacity: 0.8 + Math.random() * 0.2, swing: Math.random() * 2, swingSpeed: 0.03 + Math.random() * 0.04, phase: Math.random() * Math.PI * 2 }; }
function startConfetti() { if (confettiRunning) return; confettiRunning = true; for (let i = 0; i < 120; i++) confettiPieces.push(createPiece()); animateConfetti(); }
function animateConfetti() { confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); let alive = false; for (let i = 0; i < confettiPieces.length; i++) { const p = confettiPieces[i]; p.y += p.vy; p.x += p.vx + Math.sin(p.phase) * p.swing; p.phase += p.swingSpeed; p.rotation += p.rotSpeed; if (p.y > confettiCanvas.height + 20) continue; alive = true; confettiCtx.save(); confettiCtx.translate(p.x, p.y); confettiCtx.rotate(p.rotation * Math.PI / 180); confettiCtx.globalAlpha = p.opacity; confettiCtx.fillStyle = p.color; confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); confettiCtx.restore(); } if (alive) { if (Math.random() < 0.08) confettiPieces.push(createPiece()); requestAnimationFrame(animateConfetti); } else confettiRunning = false; }

let isOpen = false;
function toggleCard() {
  if (isOpen) { document.getElementById('card').classList.remove('open'); document.getElementById('tapHint').textContent = '👆 点击打开'; isOpen = false; }
  else {
    document.getElementById('card').classList.add('open'); document.getElementById('tapHint').textContent = '👆 点击关闭'; isOpen = true;
    startConfetti();
    try {
      const audioCtx = new AudioContext();
      const notes = [523.25, 587.33, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.35);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + i * 0.12); osc.stop(audioCtx.currentTime + i * 0.12 + 0.35);
      });
    } catch(e) {}
    for (let i = 0; i < 6; i++) setTimeout(createBalloon, i * 80);
  }
}
</script>

</script>
